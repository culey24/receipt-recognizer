services:
  redis:
    image: redis:7-alpine
    container_name: receipt-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

  mongo:
    image: mongo:7
    container_name: receipt-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: receipt-minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: receipt-api
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      MONGO_URI: mongodb://mongo:27017
      MINIO_ENDPOINT_URL: http://minio:9000
      LOCAL_STORAGE_PATH: /app/data/uploads
    volumes:
      - ./:/app
      - backend_data:/app/data
    ports:
      - "${API_PORT:-8000}:8000"
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis
      - mongo
      - minio

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: receipt-worker
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      MONGO_URI: mongodb://mongo:27017
      MINIO_ENDPOINT_URL: http://minio:9000
      LOCAL_STORAGE_PATH: /app/data/uploads
    volumes:
      - ./:/app
      - backend_data:/app/data
    command: arq src.worker.WorkerSettings
    depends_on:
      - redis
      - mongo
      - minio

  frontend:
    image: node:20-alpine
    container_name: receipt-frontend
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT:-8000}
    volumes:
      - ../frontend:/app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - api

volumes:
  redis_data:
  mongo_data:
  minio_data:
  backend_data:
