# fly.toml app configuration file generated for receipt-recognizer on 2026-04-06T22:59:03+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'receipt-recognizer'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

# Two processes from the same Docker image:
#   app    — FastAPI HTTP server (receives external traffic)
#   worker — ARQ background worker (no HTTP, just queue consumer)
[processes]
  app    = "python -m uvicorn main:app --host 0.0.0.0 --port 8000"
  worker = "arq src.worker.WorkerSettings"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
